<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Movie Details</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="movie">
  <div id="loader"></div>
  <header id="navbar"></header>

  <div class="movie-hero" id="movieHero">
    <div class="movie-hero-bg" id="movieHeroBg"></div>
    <div class="movie-hero-overlay"></div>
    <div class="movie-hero-content">
      <div class="movie-poster-thumb">
        <img id="moviePoster" src="" alt="Movie Poster">
      </div>
      <div class="movie-info">
        <div class="movie-tags" id="movieTags"></div>
        <h1 id="movieTitle">Loading...</h1>
        <p class="movie-desc" id="movieDesc"></p>
        <div class="btn-group">
          <button class="btn ghost" id="watchlistBtn" style="font-size:.85rem;padding:8px 16px">♡ Add to Watchlist</button>
        </div>
      </div>
    </div>
  </div>

  <div style="background:#f7f7f7">
    <div class="showtime-section" id="showtimeSection">
      <h2>🎬 Select Showtime</h2>
      <div id="theaterShows"></div>
    </div>

    <div class="section" style="padding-top:0; max-width:1400px; margin:0 auto">
      <div class="section-head">
        <div><p class="eyebrow">Audience</p><h2>Reviews</h2></div>
      </div>
      <div id="reviewsList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px"></div>
      <div id="reviewForm" style="display:none">
        <div class="summary-card" style="margin:0">
          <h3>Write a Review</h3>
          <div class="form-group" style="margin-top:12px">
            <label>Rating</label>
            <select id="reviewRating" style="padding:10px 14px;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:8px;color:#111;font-family:Outfit,sans-serif;font-size:.9rem;outline:none">
              <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
              <option value="4">⭐⭐⭐⭐ Good</option>
              <option value="3">⭐⭐⭐ Average</option>
              <option value="2">⭐⭐ Below Average</option>
              <option value="1">⭐ Poor</option>
            </select>
          </div>
          <div class="form-group">
            <label>Comment</label>
            <textarea id="reviewComment" rows="3" style="padding:11px 14px;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:8px;color:#111;font-family:Outfit,sans-serif;font-size:.9rem;resize:vertical;outline:none;width:100%" placeholder="Share your thoughts..."></textarea>
          </div>
          <button class="btn primary" id="submitReview">Post Review</button>
        </div>
      </div>
    </div>
  </div>

  <footer style="background:#111;color:#aaa;text-align:center;padding:24px;font-size:.85rem">
    © 2026 CineGo. All rights reserved.
  </footer>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
