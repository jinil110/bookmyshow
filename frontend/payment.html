<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Payment</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body data-page="payment">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="payment-page">
    <p class="eyebrow">Secure Checkout</p>
    <h1 style="font-size:2rem; font-weight:900; letter-spacing:-1px; margin-bottom:4px">Complete Payment</h1>
    <p style="color:var(--text2); font-size:0.9rem">Review your booking details before paying</p>

    <div class="summary-card" id="paymentSummary">
      <p style="color:var(--text3)">Loading booking details...</p>
    </div>

    <button class="razorpay-btn" id="razorpayBtn">
      <img src="https://razorpay.com/favicon.ico" width="20" height="20" alt="Razorpay">
      Pay with Razorpay
    </button>
    <div style="text-align:center; margin:16px 0; color:var(--text3); font-size:0.82rem">— or —</div>
    <button class="btn ghost full" id="demoPay">Use Demo Payment (Test)</button>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
