<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="auth-wrap">
    <form id="loginForm" class="auth-card" novalidate>
      <p class="eyebrow">Welcome Back</p>
      <h1>Login</h1>
      <p class="sub">Sign in to your CineGo account</p>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button class="btn primary full" type="submit">Sign In →</button>
      <p class="divider" style="margin-top:20px">Don't have an account? <a class="link" href="register.html">Register</a></p>
    </form>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
