<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Book Movie Tickets Online</title>
  <meta name="description" content="Book movie tickets instantly. Trending movies, real showtimes, interactive seat selection.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
  <div id="loader"></div>
  <header id="navbar"></header>

  <section class="hero" id="heroSection">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="eyebrow" id="heroEyebrow">🔥 Now Trending</p>
      <h1 id="heroTitle">Loading...</h1>
      <div class="hero-meta" id="heroMeta"></div>
      <p id="heroDesc" style="display:none"></p>
      <div class="btn-group">
        <a class="btn primary" id="heroBookBtn" href="#">🎟 Book Tickets</a>
        <a class="btn ghost" href="#movies">Browse All →</a>
      </div>
    </div>
  </section>

  <div style="background:#f7f7f7">
    <div class="section" style="padding-bottom:0">
      <div class="section-head">
        <div><p class="eyebrow">🔥 Hot Right Now</p><h2>Trending Movies</h2></div>
      </div>
      <div id="trendingGrid" class="trending-scroll" style="padding-bottom:8px"></div>
    </div>

    <section class="section" id="movies">
      <div class="section-head">
        <div><p class="eyebrow">In Cinemas Now</p><h2>Now Showing</h2></div>
        <div class="tools">
          <input id="searchMovies" type="search" placeholder="Search movies...">
          <select id="categoryFilter">
            <option value="All">All Genres</option>
            <option value="Action">Action</option>
            <option value="Animation">Animation</option>
            <option value="Drama">Drama</option>
            <option value="Comedy">Comedy</option>
            <option value="Romance">Romance</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Thriller">Thriller</option>
            <option value="Horror">Horror</option>
          </select>
        </div>
      </div>
      <div id="movieGrid" class="movie-grid"></div>
    </section>
  </div>

  <footer style="background:#111;color:#aaa;text-align:center;padding:24px;font-size:.85rem;margin-top:0">
    © 2026 CineGo. All rights reserved. &nbsp;|&nbsp; Book Smarter, Watch Better.
  </footer>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
