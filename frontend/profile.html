<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - My Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="section" style="padding-top:100px">
    <div id="profilePanel" class="profile-panel"></div>

    <div class="section-head" style="margin-top:40px">
      <div><p class="eyebrow">Saved</p><h2>My Watchlist</h2></div>
    </div>
    <div id="watchlistGrid" class="movie-grid"></div>

    <div class="section-head" style="margin-top:48px">
      <div><p class="eyebrow">History</p><h2>My Bookings</h2></div>
    </div>
    <div id="bookingHistory" class="booking-list"></div>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
