<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Booking Confirmed!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="confirmation">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="confirmation-page">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <p class="eyebrow">Booking Confirmed</p>
      <h1 style="font-size:2rem; font-weight:900; letter-spacing:-1px; margin:8px 0 4px">Your Tickets Are Ready!</h1>
      <p style="color:var(--text2); font-size:0.9rem; margin-bottom:24px">Enjoy the show! Details are below.</p>
      <div id="confirmationSummary"></div>
      <div class="btn-group" style="justify-content:center; margin-top:24px">
        <a class="btn primary" href="profile.html">View All Bookings</a>
        <a class="btn secondary" href="index.html">Browse More</a>
      </div>
    </div>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
