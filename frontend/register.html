<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Create Account</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="auth-wrap">
    <form id="registerForm" class="auth-card" novalidate>
      <p class="eyebrow">Join CineGo</p>
      <h1>Create Account</h1>
      <p class="sub">Start booking tickets in seconds</p>
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input id="regName" name="name" type="text" placeholder="Your name" required minlength="2">
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input id="regEmail" name="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input id="regPassword" name="password" type="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button class="btn primary full" type="submit">Create Account →</button>
      <p class="divider" style="margin-top:20px">Already have an account? <a class="link" href="login.html">Login</a></p>
    </form>
  </main>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
