<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Select Seats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="seats">
  <div id="loader"></div>
  <header id="navbar"></header>

  <main class="seat-page">
    <div id="seatHeader">
      <h2 id="seatMovieTitle">Loading...</h2>
      <p class="seat-meta" id="seatMeta"></p>
    </div>

    <div class="screen-wrap">
      <div class="screen">◀ &nbsp; SCREEN &nbsp; ▶</div>
    </div>

    <div class="seat-category-label">BASIC (FRONT ROWS) — ₹<span id="basicPrice">-</span></div>
    <div class="seat-grid" id="seatGridBasic"></div>

    <div class="seat-category-label">PREMIUM (BACK ROWS) — ₹<span id="premiumPrice">-</span></div>
    <div class="seat-grid" id="seatGridPremium"></div>

    <div class="legend">
      <span><div class="legend-dot available"></div> Available</span>
      <span><div class="legend-dot selected"></div> Selected</span>
      <span><div class="legend-dot booked"></div> Booked</span>
    </div>
  </main>

  <!-- Sticky Summary -->
  <div class="summary-bar" id="seatSummary">
    <div class="summary-info">
      <span class="seats-selected" id="selectedSeatsLabel">No seats selected</span>
      <span class="total-price" id="totalPriceLabel">₹0</span>
    </div>
    <button class="btn primary" id="proceedBtn" disabled>Proceed to Pay</button>
  </div>

  <div id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
