<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CineGo - Admin</title><link rel="stylesheet" href="css/style.css"></head><body data-page="admin"><div id="loader"></div><header id="navbar"></header><main class="section"><div class="section-head"><div><p class="eyebrow">Admin</p><h1>Movies and showtimes</h1></div><button id="resetMovieForm" class="btn secondary">New Movie</button></div><section class="admin-grid"><form id="movieAdminForm" class="form-card"><input type="hidden" name="id"><label>Title<input name="title" required></label><label>Description<textarea name="description" required></textarea></label><div class="two"><label>Duration<input name="duration" placeholder="2h 10m" required></label><label>Rating<input name="rating" placeholder="UA" required></label></div><div class="two"><label>Category<input name="category" required></label><label>Price<input name="price" type="number" min="1" required></label></div><label>Showtimes comma separated<input name="showtimes" placeholder="2026-05-01T18:30, 2026-05-01T21:30"></label><label>Poster URL<input name="poster" required></label><label>Banner URL<input name="banner"></label><button class="btn primary" type="submit">Save Movie</button></form><div id="adminMovieList" class="booking-list"></div></section></main><div id="toast"></div><script src="js/app.js"></script></body></html>
